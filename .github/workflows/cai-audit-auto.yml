name: CAI Audit Auto

on:
  issues:
    types: [closed]

jobs:
  check:
    if: contains(github.event.issue.labels.*.name, 'cai:raised')
    runs-on: ubuntu-latest
    permissions:
      issues: read
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      count: ${{ steps.gate.outputs.count }}
    steps:
      - name: Count closed cai:raised issues
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh issue list --repo "${{ github.repository }}" \
            --state closed --label "cai:raised" \
            --limit 1000 --json number --jq 'length')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ] && [ $((count % 10)) -eq 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Closed cai:raised issues: $count"

  audit:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [cost, errors, architecture]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage cai config for container
        uses: ./.github/actions/setup-cai
        with:
          cai_github_app_pem: ${{ secrets.CAI_GITHUB_APP_PEM }}
          cai_app_env: ${{ secrets.CAI_APP_ENV }}

      - name: Run CAI Audit (${{ matrix.mode }})
        run: |
          docker run --rm \
            -v "${RUNNER_TEMP}/cai-config:/home/cai/.config/cai:ro" \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            -e LANGFUSE_BASE_URL="${{ secrets.LANGFUSE_BASE_URL }}" \
            docker.io/robotsix/cai:latest \
            cai-audit --repo "${{ github.repository }}" --mode "${{ matrix.mode }}"
