name: CAI Audit Auto

on:
  workflow_run:
    workflows:
      - "CAI Solve"
      - "CAI Solve (PR review)"
      - "CAI Resolve Conflicts"
      - "CAI Sourcing"
      - "CAI Audit Errors"
      - "CAI Audit Duplication"
    types: [completed]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      count: ${{ steps.gate.outputs.count }}
    steps:
      - name: Count completed cai-* workflow runs
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          total=0
          workflows=$(gh api "/repos/${{ github.repository }}/actions/workflows" --jq '.workflows[] | select(.path | startswith(".github/workflows/cai-")) | select(.name != "CAI Audit" and .name != "CAI Audit Auto") | .id')
          for id in $workflows; do
            count=$(gh api "/repos/${{ github.repository }}/actions/workflows/$id/runs?status=completed&per_page=1" --jq '.total_count')
            total=$((total + count))
          done
          echo "count=$total" >> "$GITHUB_OUTPUT"
          if [ "$total" -gt 0 ] && [ $((total % 10)) -eq 0 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Completed cai-* workflow runs: $total"

  audit:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [cost, errors]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage cai config for container
        uses: ./.github/actions/setup-cai
        with:
          cai_github_app_pem: ${{ secrets.CAI_GITHUB_APP_PEM }}
          cai_app_env: ${{ secrets.CAI_APP_ENV }}

      - name: Run CAI Audit (${{ matrix.mode }})
        run: |
          docker run --rm \
            -v "${RUNNER_TEMP}/cai-config:/home/cai/.config/cai:ro" \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            -e LANGFUSE_BASE_URL="${{ secrets.LANGFUSE_BASE_URL }}" \
            docker.io/robotsix/cai:latest \
            cai-audit --repo "${{ github.repository }}" --mode "${{ matrix.mode }}"
