name: CAI Solve

on:
  issues:
    types: [labeled]

jobs:
  solve:
    if: github.event.label.name == 'cai:raised'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run CAI Solve
        run: |
          echo "${{ secrets.CAI_GITHUB_APP_PEM }}" > ${{ github.workspace }}/cai-github-app.pem
          chmod 600 ${{ github.workspace }}/cai-github-app.pem
          
          docker run --rm \
            --user cai \
            --env-file <(echo "${{ secrets.CAI_APP_ENV }}") \
            -v ${{ github.workspace }}/cai-github-app.pem:/home/cai/.config/cai/github-app.pem:ro \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            -e LANGFUSE_BASE_URL="${{ secrets.LANGFUSE_BASE_URL }}" \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            docker.io/robotsix/cai:latest \
            cai-solve ${{ github.repository }}#${{ github.event.issue.number }}