name: CAI Solve

on:
  issues:
    types: [labeled]

jobs:
  solve:
    if: github.event.label.name == 'cai:raised'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run CAI agent
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            -e LANGFUSE_HOST="${{ secrets.LANGFUSE_HOST }}" \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            docker.io/robotsix/cai:latest \
            cai-solve --repo ${{ github.repository }} --issue ${{ github.event.issue.number }}
