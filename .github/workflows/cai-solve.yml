name: CAI Solve

on:
  issues:
    types: [labeled]

concurrency:
  group: cai-solve-${{ github.event.issue.number }}-${{ github.event.label.name }}
  cancel-in-progress: true

jobs:
  solve:
    if: github.event.label.name == 'cai:raised'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      issues: write

    steps:
      - name: Verify authorized user
        env:
          APPROVED_AI_USERS: ${{ secrets.APPROVED_AI_USERS }}
          ACTOR: ${{ github.actor }}
        run: |
          if ! grep -qFx "$ACTOR" <<< "$(tr ',' '\n' <<< "$APPROVED_AI_USERS" | tr ' ' '\n' | tr -d '\r')"; then
            echo "Unauthorized user: $ACTOR"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage cai config for container
        uses: ./.github/actions/setup-cai
        with:
          cai_github_app_pem: ${{ secrets.CAI_GITHUB_APP_PEM }}
          cai_app_env: ${{ secrets.CAI_APP_ENV }}

      - name: Run CAI Solve
        run: |
          docker run --rm \
            -v "${RUNNER_TEMP}/cai-config:/home/cai/.config/cai:ro" \
            -e OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" \
            -e LANGFUSE_SECRET_KEY="${{ secrets.LANGFUSE_SECRET_KEY }}" \
            -e LANGFUSE_PUBLIC_KEY="${{ secrets.LANGFUSE_PUBLIC_KEY }}" \
            -e LANGFUSE_BASE_URL="${{ secrets.LANGFUSE_BASE_URL }}" \
            docker.io/robotsix/cai:latest \
            cai-solve ${{ github.repository }}#${{ github.event.issue.number }}
      - name: Mark issue as failed
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "cai:failed" --repo "${{ github.repository }}" --color "b60205" --description "CAI solve did not complete" 2>/dev/null || true
          gh issue edit "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --add-label "cai:failed" --remove-label "cai:raised"
