name: CAI Chain Sub-Issue

on:
  issues:
    types: [closed]

concurrency:
  group: cai-chain-sub-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  chain:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stage cai config for container
        uses: ./.github/actions/setup-cai
        with:
          cai_github_app_pem: ${{ secrets.CAI_GITHUB_APP_PEM }}
          cai_app_env: ${{ secrets.CAI_APP_ENV }}

      - name: Chain to next sub-issue
        run: |
          docker run --rm \
            -v "${RUNNER_TEMP}/cai-config:/home/cai/.config/cai:ro" \
            docker.io/robotsix/cai:latest \
            cai-chain-sub-issue ${{ github.repository }}#${{ github.event.issue.number }}
