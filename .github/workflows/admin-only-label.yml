name: Admin-only label guard

# Restricts labels that trigger autonomous claude execution to repo
# admins. When a non-admin applies one of the restricted labels, this
# workflow removes it and posts a comment explaining why. Without this
# guard, anyone with read access could queue arbitrary issues into the
# cai implement subagent.
#
# Triggers only on the `labeled` event for issues, so it's a no-op for
# all other label changes.

on:
  issues:
    types: [labeled]
  pull_request_target:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  enforce:
    if: >-
      contains(fromJSON('["auto-improve:raised","auto-improve:in-progress","auto-improve:pr-open","auto-improve:merged","auto-improve:solved","auto-improve:needs-exploration","auto-improve:refined","auto-improve:revising","auto-improve:parent","merge-blocked","auto-improve:planned","auto-improve:plan-approved","auto-improve:refining","auto-improve:planning","auto-improve:applying","auto-improve:applied","auto-improve:human-needed","auto-improve:pr-human-needed","human:solved","auto-improve:triaging","kind:code","kind:maintenance","pr:reviewing-code","pr:revision-pending","pr:reviewing-docs","pr:approved","pr:rebasing","pr:ci-failing","needs-human-review","needs-workflow-review"]'), github.event.label.name)
    runs-on: ubuntu-latest
    steps:
      - name: Check sender's permission
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERM=$(gh api \
            "repos/${{ github.repository }}/collaborators/${{ github.event.sender.login }}/permission" \
            --jq '.permission')
          echo "perm=$PERM" >> "$GITHUB_OUTPUT"
          echo "Sender ${{ github.event.sender.login }} has permission: $PERM"

      - name: Remove label and notify if not admin
        if: steps.check.outputs.perm != 'admin'
        env:
          GH_TOKEN: ${{ github.token }}
          NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          gh api -X DELETE \
            "repos/${{ github.repository }}/issues/${NUMBER}/labels/${{ github.event.label.name }}"

          gh issue comment "${NUMBER}" \
            --repo "${{ github.repository }}" \
            --body "@${{ github.event.sender.login }} only repo admins can apply the \`${{ github.event.label.name }}\` label — it triggers autonomous code execution by the cai implement subagent. The label has been removed."
