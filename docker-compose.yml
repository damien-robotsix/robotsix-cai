# Phase A — runs the first-runnable-container locally or on the server.
#
# Two ways to use this file:
#
#   * Local development: `docker compose build && docker compose up`
#     builds the image from the Dockerfile in this directory.
#
#   * Self-hosted server: `docker compose pull && docker compose up -d`
#     pulls the published image from Docker Hub (robotsix/cai:latest).
#
# Two auth modes (pick one — see README for details):
#
#   * .env file with ANTHROPIC_API_KEY (default below)
#   * Mounted ~/.claude/.credentials.json from the host (uncomment below)

services:
  cai:
    image: robotsix/cai:latest
    build: .
    env_file:
      - .env
    volumes:
      # Persistent claude-code session transcripts. claude-code writes
      # session JSONL into ~/.claude/projects/<sanitized-cwd>/<sid>.jsonl
      # inside the container; this named volume keeps that data across
      # container restarts so future analyzer runs can read it.
      - cai_transcripts:/root/.claude/projects
      # Persistent gh CLI configuration. The installer runs
      # `docker compose run --rm cai gh auth login` once and the
      # resulting credentials land here, so subsequent `docker compose
      # up` runs don't need to re-authenticate.
      - cai_gh_config:/root/.config/gh
      # Uncomment to use OAuth credentials from the host instead of an
      # API key. Requires `claude login` to have been run on the host so
      # the credentials file already exists. When this is in use,
      # ANTHROPIC_API_KEY in .env is unnecessary.
      #
      # - ${HOME}/.claude/.credentials.json:/root/.claude/.credentials.json:ro

volumes:
  cai_transcripts:
    name: cai_transcripts
  cai_gh_config:
    name: cai_gh_config
