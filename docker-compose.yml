# Phase A — runs the first-runnable-container locally or on the server.
#
# Two ways to use this file:
#
#   * Local development: `docker compose build && docker compose up`
#     builds the image from the Dockerfile in this directory.
#
#   * Self-hosted server: `docker compose pull && docker compose up -d`
#     pulls the published image from Docker Hub (robotsix/cai:latest).
#
# Two auth modes (pick one — see README for details):
#
#   * .env file with ANTHROPIC_API_KEY (default below)
#   * Mounted ~/.claude/.credentials.json from the host (uncomment below)

services:
  cai:
    image: robotsix/cai:latest
    build: .
    # Long-lived service — supercronic runs the analyzer on a schedule
    # inside the container. Restart on crash + host reboot, but don't
    # restart a container the user stopped deliberately.
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Crontab expressions for the scheduled tasks. Any valid
      # 5-field cron line works — see https://crontab.guru/ —
      # supercronic also supports @hourly, @daily, etc.
      #
      # CAI_CYCLE_SCHEDULE drives the fix pipeline on auto-improve:plan-approved
      # issues (fix → revise → review-pr → merge → confirm). A flock
      # in cmd_cycle serializes overlapping runs so issues are
      # processed one at a time. CAI_PLAN_ALL_SCHEDULE drives the
      # upstream refine → plan flow that turns :raised/:refined
      # issues into :planned for humans to approve. The remaining
      # schedules are for orthogonal tasks that run independently.
      CAI_CYCLE_SCHEDULE: "0 * * * *"        # hourly — restart-recovery + dispatch one actionable issue/PR
      CAI_VERIFY_SCHEDULE: "15 * * * *"     # hourly @15 — label-state reconciliation (cmd_verify)
      CAI_ANALYZER_SCHEDULE: "0 0 * * *"   # daily at 00:00 UTC (LLM call)
      CAI_AUDIT_SCHEDULE: "0 */6 * * *"     # every 6h (Sonnet: LLM audit + deterministic cleanup; see README)
      CAI_CODE_AUDIT_SCHEDULE: "0 3 * * 0"  # weekly Sunday 03:00 UTC (Sonnet, code consistency)
      CAI_PROPOSE_SCHEDULE: "0 4 * * 0"    # weekly Sunday 04:00 UTC (creative improvement proposals)
      CAI_UPDATE_CHECK_SCHEDULE: "0 4 * * 1" # weekly Monday 04:00 UTC (Claude Code release check)
      CAI_EXTERNAL_SCOUT_SCHEDULE: "0 6 * * 1" # weekly Monday 06:00 UTC (scout for external libraries)
      CAI_HEALTH_REPORT_SCHEDULE: "0 7 * * 1" # weekly Monday 07:00 UTC (pipeline health report)
      CAI_COST_OPTIMIZE_SCHEDULE: "0 5 * * 0" # weekly Sunday 05:00 UTC (cost-reduction analysis)
      CAI_CHECK_WORKFLOWS_SCHEDULE: "0 */6 * * *" # every 6h (check for CI workflow failures)
      CAI_MERGE_CONFIDENCE_THRESHOLD: "high" # high | medium | disabled
      CAI_MERGE_MAX_DIFF_LEN: "40000"       # max chars of PR diff passed to merge agent
      CAI_TRANSCRIPT_WINDOW_DAYS: "7"       # only parse sessions from last N days
      CAI_TRANSCRIPT_MAX_FILES: "50"        # read at most N recent transcript files (0 = no limit)
    volumes:
      # Persistent state for the cai user — Claude OAuth credentials,
      # session transcripts, gh config, claude-code's runtime
      # `.claude.json` config file (NB: this is a SIBLING of the
      # `.claude/` directory, not inside it), and anything else
      # claude-code or gh write under the user's home.
      #
      # Mounting `/home/cai` as a single volume is intentional:
      # claude-code stores its credentials at `~/.claude/.credentials.json`
      # but its main runtime config at `~/.claude.json` (a sibling
      # file outside the directory). Mounting only `/home/cai/.claude`
      # captures the credentials but loses the sibling file on every
      # restart, breaking auth persistence. Mounting the parent dir
      # captures both.
      #
      # Authenticate once with:
      #
      #     docker compose run --rm -it cai claude
      #
      # The REPL auto-prompts for OAuth login on first start. Exit
      # gracefully (`/exit` or Ctrl-D) to flush credentials to disk.
      # Subsequent `docker compose up` runs find the credentials and
      # don't need to re-authenticate.
      #
      # For API-key auth, set ANTHROPIC_API_KEY in .env instead — the
      # volume can stay empty and claude-code will use the env var.
      - cai_home:/home/cai
      # Persistent per-agent memory (`.claude/agent-memory/<name>/`).
      # Each declarative subagent has `memory: project` in its
      # frontmatter, which Claude Code stores under
      # `.claude/agent-memory/<agent-name>/`. The /app agents
      # (analyze, audit, confirm, merge) read/write
      # this volume directly. The cloned-worktree agents (fix,
      # revise, review-pr, review-docs, code-audit, propose,
      # propose-review, update-check, external-scout, plan, select, git)
      # also access their memory directly from the mounted volume.
      # (cai-rebase is excluded — lightweight agent, no memory
      # tracking by design.)
      - cai_agent_memory:/app/.claude/agent-memory
      - cai_logs:/var/log/cai
    # Required if Watchtower is enabled (uncommented below):
    # labels:
    #   - "com.centurylinklabs.watchtower.enable=true"

  # Optional: Watchtower auto-update sidecar. Uncomment this service AND
  # add the label above to the `cai` service to enable automatic
  # updates when a new image is published to docker.io/robotsix/cai.
  # See README for the mid-fix-restart caveat.
  #
  # watchtower:
  #   image: nickfedor/watchtower:1.16.1
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command:
  #     - --label-enable
  #     - --interval=43200
  #     - --cleanup

volumes:
  cai_home:
    name: cai_home
  cai_agent_memory:
    name: cai_agent_memory
  cai_logs:
    name: cai_logs
