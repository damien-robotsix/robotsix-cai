# docs/modules.yaml — audit-refactor module registry (step 1.1).
#
# Each entry defines one logical "module" (group of files) that the
# cai audit pipeline can target. The loader lives at
# cai_lib/audit/modules.py.
#
# Coverage rules enforced by future audit stages (not this step):
#   - Every tracked file (git ls-files) must match exactly one module.
#   - Zero matches or 2+ matches are coverage failures.
#
# Per-entry authoring rules:
#   - `name`:    kebab-case, unique across the file; used as the
#                `--module` argument to `cai audit`.
#   - `summary`: single-line description surfaced to audit agents.
#   - `doc`:     path to narrative markdown (relative to this file's
#                directory, i.e. docs/). Files will be created in a
#                later audit-refactor step; the loader's existence
#                check is OFF by default in step 1.1.
#   - `globs`:   gitignore-style patterns (fnmatch semantics) matched
#                against the tracked-file list. Must be a non-empty
#                list of strings.

modules:
  - name: dispatcher-cli
    summary: Top-level CLI entry point and root-level shims.
    globs:
      - "cai.py"
      - "parse.py"
      - "publish.py"
    doc: "docs/modules/dispatcher-cli.md"

  - name: cai-lib
    summary: Core library — FSM, dispatcher, state handlers, helpers.
    globs:
      - "cai_lib/**"
    doc: "docs/modules/cai-lib.md"

  - name: agents
    summary: Declarative Claude subagent definitions.
    globs:
      - ".claude/agents/**"
      - ".claude/settings.json"
    doc: "docs/modules/agents.md"

  - name: workflows
    summary: GitHub Actions CI/CD workflows.
    globs:
      - ".github/workflows/**"
    doc: "docs/modules/workflows.md"

  - name: docs-site
    summary: User-facing documentation, README, and agent guidance files.
    globs:
      - "docs/**"
      - "README.md"
      - "CODEBASE_INDEX.md"
      - "CLAUDE.md"
      - "LICENSE"
    doc: "docs/modules/docs-site.md"

  - name: container
    summary: Container build, orchestration, and installer artefacts.
    globs:
      - "Dockerfile"
      - "docker-compose.yml"
      - "entrypoint.sh"
      - "install.sh"
      - ".env.example"
      - "workspaces.json.example"
      - ".gitignore"
      - "pyproject.toml"
    doc: "docs/modules/container.md"

  - name: scripts
    summary: Maintenance and code-generation scripts.
    globs:
      - "scripts/**"
    doc: "docs/modules/scripts.md"

  - name: tests
    summary: Pytest suite.
    globs:
      - "tests/**"
    doc: "docs/modules/tests.md"
