# docs/modules.yaml — audit-refactor module registry (step 1.1).
#
# Each entry defines one logical "module" (group of files) that the
# cai audit pipeline can target. The loader lives at
# cai_lib/audit/modules.py.
#
# Coverage rules enforced by future audit stages (not this step):
#   - Every tracked file (git ls-files) must match exactly one module.
#   - Zero matches or 2+ matches are coverage failures.
#
# Per-entry authoring rules:
#   - `name`:    kebab-case, unique across the file; matched against
#                the audit runner's internal module iteration and
#                embedded in each published issue's
#                `<!-- module: <name> -->` body footer. Not a CLI
#                argument — `cai audit <kind>` iterates every module.
#   - `summary`: single-line description surfaced to audit agents.
#   - `doc`:     path to narrative markdown (relative to this file's
#                directory, i.e. docs/). Files will be created in a
#                later audit-refactor step; the loader's existence
#                check is OFF by default in step 1.1.
#   - `globs`:   gitignore-style patterns (fnmatch semantics) matched
#                against the tracked-file list. Must be a non-empty
#                list of strings.

modules:
  - name: cli
    summary: Top-level CLI dispatcher, subcommand modules, and root-level shims.
    globs:
      - "cai.py"
      - "parse.py"
      - "publish.py"
      - "cai_lib/__init__.py"
      - "cai_lib/dispatcher.py"
      - "cai_lib/cmd_*.py"
    doc: "docs/modules/cli.md"

  - name: fsm
    summary: FSM enums, transitions, confidence parsing, and diagram generator.
    globs:
      - "cai_lib/fsm*.py"
      - "cai_lib/admin_sigils.py"
      - "scripts/generate-fsm-docs.py"
    doc: "docs/modules/fsm.md"

  - name: actions
    summary: Per-state handlers driven by the FSM dispatcher.
    globs:
      - "cai_lib/actions/*.py"
    doc: "docs/modules/actions.md"

  - name: audit
    summary: Audit subsystem — on-demand per-module code, cost, workflow, and external-library auditors plus the transcript-finder helper.
    globs:
      - "cai_lib/audit/*.py"
      - "cai_lib/audit_logging.py"
      - ".claude/agents/audit/*.md"
    doc: "docs/modules/audit.md"

  - name: agents-implementation
    summary: Plan, select, implement, revise, rebase, and fix-ci subagents.
    globs:
      - ".claude/agents/implementation/*.md"
    doc: "docs/modules/agents-implementation.md"

  - name: agents-lifecycle
    summary: Lifecycle subagents — triage, refine, explore, propose, dup-check, rescue, unblock.
    globs:
      - ".claude/agents/lifecycle/*.md"
    doc: "docs/modules/agents-lifecycle.md"

  - name: agents-review
    summary: Review-stage subagents — review-pr, review-docs, merge, comment-filter.
    globs:
      - ".claude/agents/review/*.md"
    doc: "docs/modules/agents-review.md"

  - name: agents-ops
    summary: Ops subagents — check-workflows, maintain, update-check.
    globs:
      - ".claude/agents/ops/*.md"
    doc: "docs/modules/agents-ops.md"

  - name: agents-utility
    summary: Utility subagents — memorize, git, test-runner, cost-optimize, external-scout.
    globs:
      - ".claude/agents/utility/*.md"
    doc: "docs/modules/agents-utility.md"

  - name: agents-config
    summary: Claude Code harness configuration for the agents pipeline.
    globs:
      - ".claude/settings.json"
    doc: "docs/modules/agents-config.md"

  - name: transcripts
    summary: Transcript parsing and cross-host sync of JSONL session transcripts.
    globs:
      - "cai_lib/parse.py"
      - "cai_lib/transcript_sync.py"
    doc: "docs/modules/transcripts.md"

  - name: github-glue
    summary: gh CLI wrappers, issue publisher, dup-check, and issue-model helpers.
    globs:
      - "cai_lib/github.py"
      - "cai_lib/publish.py"
      - "cai_lib/dup_check.py"
      - "cai_lib/issues.py"
    doc: "docs/modules/github-glue.md"

  - name: installer
    summary: Container image, Compose orchestration, installer, and example configuration templates.
    globs:
      - "Dockerfile"
      - "docker-compose.yml"
      - "entrypoint.sh"
      - "install.sh"
      - ".env.example"
      - "workspaces.json.example"
      - ".gitignore"
    doc: "docs/modules/installer.md"

  - name: workflows
    summary: GitHub Actions CI/CD workflows.
    globs:
      - ".github/workflows/*.yml"
    doc: "docs/modules/workflows.md"

  - name: docs
    summary: User-facing prose docs, README, license, CLAUDE.md, SDK spike notes, and the auto-generated index.
    globs:
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - "CLAUDE.md"
      - "SDK_SPIKE_NOTES.md"
    doc: "docs/modules/docs.md"

  - name: tests
    summary: Pytest suite and Python project configuration.
    globs:
      - "tests/**"
      - "pyproject.toml"
    doc: "docs/modules/tests.md"

  - name: subagent
    summary: Agent invocation infrastructure — SDK execution, legacy argv facade, cost attribution, stderr capture, and FSM state stamping.
    globs:
      - "cai_lib/subagent/*.py"
      - "cai_lib/cai_subagent.py"
    doc: "docs/modules/subagent.md"

  - name: config
    summary: Shared infra — constants, logging, subprocess helpers, cost accounting, and watchdog.
    globs:
      - "cai_lib/config.py"
      - "cai_lib/utils/*.py"
      - "cai_lib/subprocess_utils.py"
      - "cai_lib/cost_comment.py"
      - "cai_lib/cost_summary.py"
      - "cai_lib/watchdog.py"
    doc: "docs/modules/config.md"

  - name: scripts
    summary: Maintenance shell scripts and coverage verifier.
    globs:
      - "scripts/*.sh"
      - "scripts/check-modules-coverage.py"
    doc: "docs/modules/scripts.md"

  - name: plugins
    summary: Claude Code plugins — reusable skills that augment agent capabilities.
    globs:
      - ".claude/plugins/**"
    doc: "docs/modules/plugins.md"
