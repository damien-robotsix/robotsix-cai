# Module index — owned and maintained by cai-review-docs.
# On every PR that adds, renames, or deletes a tracked file, cai-review-docs
# updates this file and the matching docs/modules/<name>.md narrative.
#
# Schema:
#   modules:
#     - name:    short identifier (matches narrative filename stem)
#       summary: one-line summary of the module's purpose
#       globs:   list of fnmatch-style patterns, repo-root-relative,
#                that enumerate the files belonging to this module
#       doc:     path to the per-module narrative markdown file
modules:
  - name: dispatcher-cli
    summary: Top-level CLI entry point and root-level shims.
    globs:
      - "cai.py"
      - "parse.py"
      - "publish.py"
    doc: "docs/modules/dispatcher-cli.md"

  - name: cai-lib
    summary: Core library — FSM, dispatcher, state handlers, helpers.
    globs:
      - "cai_lib/**"
    doc: "docs/modules/cai-lib.md"

  - name: agents
    summary: Declarative Claude subagent definitions.
    globs:
      - ".claude/agents/**"
      - ".claude/settings.json"
    doc: "docs/modules/agents.md"

  - name: workflows
    summary: GitHub Actions CI/CD workflows.
    globs:
      - ".github/workflows/**"
    doc: "docs/modules/workflows.md"

  - name: docs-site
    summary: User-facing documentation, README, and agent guidance files.
    globs:
      - "docs/**"
      - "README.md"
      - "CODEBASE_INDEX.md"
      - "CLAUDE.md"
      - "LICENSE"
    doc: "docs/modules/docs-site.md"

  - name: container
    summary: Container build, orchestration, and installer artefacts.
    globs:
      - "Dockerfile"
      - "docker-compose.yml"
      - "entrypoint.sh"
      - "install.sh"
      - ".env.example"
      - "workspaces.json.example"
      - ".gitignore"
      - "pyproject.toml"
    doc: "docs/modules/container.md"

  - name: scripts
    summary: Maintenance and code-generation scripts.
    globs:
      - "scripts/**"
    doc: "docs/modules/scripts.md"

  - name: tests
    summary: Pytest suite.
    globs:
      - "tests/**"
    doc: "docs/modules/tests.md"
